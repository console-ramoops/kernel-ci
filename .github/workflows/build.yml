name: Build Kernel

env:
  OUT_DIR: "${{ github.workspace }}/out"

on:
  workflow_dispatch:
    inputs:
      kernel_name:
        description: "Kernel name (e.g. kernel_xiaomi_santoni)"
        required: true
      kernel_repo:
        description: "Kernel source repo URL"
        required: true
      kernel_branch:
        description: "Kernel branch"
        required: true
      device:
        description: "Device codename (e.g. santoni)"
        required: true
      defconfig:
        description: "Defconfig name (e.g. santoni_defconfig)"
        required: true
      withKernelSU:
        description: "Enable KernelSU patching"
        required: true
        type: boolean
        default: true

jobs:
  build-kernel:
    name: "⚡ Build kernel"
    runs-on: ubuntu-22.04
    env:
      WORKSPACE: ${{ github.workspace }}
      KBUILD_BUILD_USER: "builder"
      KBUILD_BUILD_HOST: "android"
      KERNEL_NAME: ${{ inputs.kernel_name }}
      KERNEL_REPO: ${{ inputs.kernel_repo }}
      KERNEL_BRANCH: ${{ inputs.kernel_branch }}
      KERNEL_DEVICE: ${{ inputs.device }}
      DEFCONFIG_NAME: ${{ inputs.defconfig }}
    steps:
      - name: "⟡ checkout"
        uses: actions/checkout@v4

      - name: "⟡ load config"
        id: config
        run: |
          CONFIG=".github/workflows/repos.json"
          echo "builddate=$(date +'%Y%m%d')" >> $GITHUB_OUTPUT
          echo "withKernelSU=${{ inputs.withKernelSU }}" >> $GITHUB_OUTPUT
          echo "useAnykernel=$(jq -r '.AnyKernel3.use' $CONFIG)" >> $GITHUB_OUTPUT
          echo "release=$(jq -r '.AnyKernel3.release' $CONFIG)" >> $GITHUB_OUTPUT

      - name: "✦ install deps"
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential bc curl git zip ftp gcc-aarch64-linux-gnu gcc-arm-linux-gnueabi libssl-dev lftp zstd wget libfl-dev python2 python3 libarchive-tools

      - name: "✦ clone anykernel3"
        run: |
          CONFIG=".github/workflows/repos.json"
          ANYKERNEL_REPO=$(jq -r '.AnyKernel3.repo' $CONFIG)
          ANYKERNEL_BRANCH=$(jq -r '.AnyKernel3.branch' $CONFIG)
          git clone --recursive --depth=1 -j $(nproc) --branch $ANYKERNEL_BRANCH $ANYKERNEL_REPO AnyKernel3

      - name: "✦ clone kernel source"
        run: |
          git clone --recursive --depth=1 -j $(nproc) --branch $KERNEL_BRANCH $KERNEL_REPO $KERNEL_NAME

      - name: "✦ fetch toolchains"
        run: |
          CONFIG=".github/workflows/repos.json"
          toolchains=$(jq -c '.toolchains' $CONFIG)
          toolchains_num="$(echo $toolchains | jq 'length')"
          for ((i=0;i<toolchains_num;i++)); do
            toolchain_name=$(echo $toolchains | jq -r ".[$i].name")
            toolchain_repo=$(echo $toolchains | jq -r ".[$i].repo")
            toolchain_branch=$(echo $toolchains | jq -r ".[$i].branch")

            git clone --recursive --depth=1 -j $(nproc) --branch $toolchain_branch $toolchain_repo $toolchain_name

            jq -r ".[$i].binPath[] | tostring" <<< "$toolchains" | while read -r bin_path; do
              echo "$WORKSPACE/$toolchain_name/$bin_path" >> $GITHUB_PATH
            done
          done

      - name: "⚙ configure build"
        id: generate-args
        run: |
          CONFIG=".github/workflows/repos.json"
          params=$(jq -c '.params' $CONFIG)
          THREAD=$(nproc --all)

          ARCH=$(echo $params | jq -r ".ARCH")
          CC=$(echo $params | jq -r ".CC")

          args="-j$THREAD"

          if [ -n "${{ env.OUT_DIR }}" ]; then
            mkdir -p ${{ env.OUT_DIR }} && args="$args O=${{ env.OUT_DIR }}"
          fi
          if [ -n "$ARCH" ]; then
            args="$args ARCH=$ARCH"
          fi
          if [ -n "$CC" ]; then
            args="$args CC=${{ env.WORKSPACE }}/$CC"
          fi
          while read -r externalCommand; do
            args="$args $externalCommand"
          done < <(jq -r '.externalCommand | to_entries[] | "\(.key)=${{ env.WORKSPACE }}/\(.value)"' <<< "$params")

          echo "ARCH=$ARCH" >> $GITHUB_OUTPUT
          echo "args=$args" >> $GITHUB_OUTPUT

      - name: "⚡ patch KernelSU"
        working-directory: ${{ env.KERNEL_NAME }}
        if: ${{ steps.config.outputs.withKernelSU == 'true' }}
        run: |
          arch=${{ steps.generate-args.outputs.ARCH }}

          if [ -d "./KernelSU" ]; then
            rm -rf "./KernelSU"
          fi
          if [ -d "./drivers/kernelsu" ]; then
            rm -rf "./drivers/kernelsu"
          fi

          curl -LSs "https://raw.githubusercontent.com/rsuntk/KernelSU/main/kernel/setup.sh" | bash -

          #echo -e "CONFIG_KPROBES=y" >> arch/$arch/configs/${{ env.DEFCONFIG_NAME }}
          #echo -e "CONFIG_HAVE_KPROBES=y" >> arch/$arch/configs/${{ env.DEFCONFIG_NAME }}
          #echo -e "CONFIG_KPROBE_EVENTS=y" >> arch/$arch/configs/${{ env.DEFCONFIG_NAME }}

          #git clone https://github.com/devnoname120/kernelsu-coccinelle
          #./kernelsu-coccinelle/scope-minimized-hooks/apply.sh .
          #rm -rf ./kernelsu-coccinelle/

      - name: "⚙ make defconfig"
        working-directory: ${{ env.KERNEL_NAME }}
        run: |
          make ${{ steps.generate-args.outputs.args }} ${{ env.DEFCONFIG_NAME }}

      - name: "⚒ compile kernel"
        working-directory: ${{ env.KERNEL_NAME }}
        run: |
          make ${{ steps.generate-args.outputs.args }}

      - name: "↑ upload Image"
        uses: actions/upload-artifact@v4
        with:
          name: Image-${{ env.KERNEL_DEVICE }}-${{ env.KERNEL_NAME }}-${{ steps.config.outputs.builddate }}
          path: ${{ env.OUT_DIR }}/arch/${{ steps.generate-args.outputs.ARCH }}/boot/Image
          if-no-files-found: ignore
          retention-days: 7

      - name: "↑ upload Image.gz"
        uses: actions/upload-artifact@v4
        with:
          name: Image.gz-${{ env.KERNEL_DEVICE }}-${{ env.KERNEL_NAME }}-${{ steps.config.outputs.builddate }}
          path: ${{ env.OUT_DIR }}/arch/${{ steps.generate-args.outputs.ARCH }}/boot/Image.gz
          if-no-files-found: ignore
          retention-days: 7

      - name: "↑ upload dtb"
        uses: actions/upload-artifact@v4
        with:
          name: dtb-${{ env.KERNEL_DEVICE }}-${{ env.KERNEL_NAME }}-${{ steps.config.outputs.builddate }}
          path: ${{ env.OUT_DIR }}/arch/${{ steps.generate-args.outputs.ARCH }}/boot/dtb
          if-no-files-found: ignore
          retention-days: 7

      - name: "↑ upload dtbo.img"
        uses: actions/upload-artifact@v4
        with:
          name: dtbo.img-${{ env.KERNEL_DEVICE }}-${{ env.KERNEL_NAME }}-${{ steps.config.outputs.builddate }}
          path: ${{ env.OUT_DIR }}/arch/${{ steps.generate-args.outputs.ARCH }}/boot/dtbo.img
          if-no-files-found: ignore
          retention-days: 7

      - name: "⬡ pack AnyKernel3"
        if: ${{ steps.config.outputs.useAnykernel == 'true' }}
        run: |
          builddate=${{ steps.config.outputs.builddate }}
          arch=${{ steps.generate-args.outputs.ARCH }}
          anykernel="${{ env.WORKSPACE }}/${{ env.KERNEL_DEVICE }}-${{ env.KERNEL_NAME }}_$builddate"

          if [ -e "${{ env.OUT_DIR }}/arch/$arch/boot/Image.gz-dtb" ]; then
            cp -f ${{ env.OUT_DIR }}/arch/$arch/boot/Image.gz-dtb ./AnyKernel3/
          fi

          cd AnyKernel3/
          zip -q -r "$anykernel.zip" *

      - name: "↑ upload AnyKernel3"
        uses: actions/upload-artifact@v4
        if: ${{ steps.config.outputs.useAnykernel == 'true' }}
        with:
          name: "${{ env.KERNEL_DEVICE }}-${{ env.KERNEL_NAME }}-${{ steps.config.outputs.builddate }}"
          path: AnyKernel3/*

      - name: "◈ github release"
        continue-on-error: true
        uses: softprops/action-gh-release@v2
        if: ${{ steps.config.outputs.useAnykernel == 'true' && steps.config.outputs.release == 'true' }}
        with:
          tag_name: v${{ steps.config.outputs.builddate }}.${{ github.run_number }}
          files: "${{ env.WORKSPACE }}/${{ env.KERNEL_DEVICE }}-${{ env.KERNEL_NAME }}_${{ steps.config.outputs.builddate }}.zip"
          generate_release_notes: true
